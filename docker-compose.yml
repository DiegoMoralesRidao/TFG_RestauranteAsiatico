version: '3.8'

services:
  postgres:
    image: dmorrid/postgre01:latest
    container_name: postgre01
    restart: always
    ports:
      - "5432:5432"
      - "30555:3456" # SSH para la base de datos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restaurante-network

  backend:
    image: dmorrid/restaurante_backend01:latest
    container_name: restaurante-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "30100:3000"
      - "30556:3456" # SSH para el backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tienda_online
      - DB_USERNAME=postgres
      - DB_PASSWORD=usuario
    networks:
      - restaurante-network

  frontend:
    image: dmorrid/restaurante_frontend01:latest
    container_name: restaurante-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "30180:3000"
      - "30557:3456" # SSH para el frontend
    networks:
      - restaurante-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - restaurante-network

networks:
  restaurante-network:
    driver: bridge

volumes:
  postgres_data:
