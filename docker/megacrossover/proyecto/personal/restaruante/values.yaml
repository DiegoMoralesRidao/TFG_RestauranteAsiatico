# Default values for restaruante.
global:
  iniciales: jhlw
  domain: recuperacion.asiaticohuercal.es
  
postgres:
  name: postgre01
  image:
    repository: dmorrid/postgre01
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    database: tienda_online
    username: postgres
    password: usuario
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: "microk8s-hostpath"

backend:
  name: restaurante-backend
  image:
    repository: dmorrid/restaurante_backend01
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  containerPort: 3000
  ssh:
    port: 3456
    nodePort: 30556
  service:
    type: NodePort
    port: 3000
    nodePort: 30100 # Puerto cambiado para evitar conflictos

frontend:
  name: restaurante-frontend
  image:
    repository: dmorrid/restaurante_frontend01
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  containerPort: 3000
  nginxPort: 80
  apiUrl: "http://backend.api.recuperacion.asiaticohuercal.es"
  ssh:
    port: 3456
    nodePort: 30557
  service:
    type: NodePort
    port: 3000
    nodePort: 30180 # Puerto cambiado para evitar conflictos

ingress:
  enabled: true
  className: "public"
  annotations:
    kubernetes.io/ingress.class: public
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: recuperacion.asiaticohuercal.es
      serviceName: restaurante-frontend
      servicePort: 3000
      paths:
        - path: /
          pathType: Prefix
    - host: www.recuperacion.asiaticohuercal.es
      serviceName: restaurante-frontend
      servicePort: 3000
      paths:
        - path: /
          pathType: Prefix
    - host: backend.api.recuperacion.asiaticohuercal.es
      serviceName: restaurante-backend
      servicePort: 3000
      paths:
        - path: /
          pathType: Prefix
