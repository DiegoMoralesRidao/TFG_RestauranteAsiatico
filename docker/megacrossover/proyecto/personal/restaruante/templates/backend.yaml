apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.containerPort }}
        - name: ssh
          containerPort: {{ .Values.backend.ssh.port }}
        env:
        - name: DB_HOST
          value: {{ .Values.postgres.name }}
        - name: DB_PORT
          value: {{ .Values.postgres.service.port | quote }}
        - name: DB_NAME
          value: {{ .Values.postgres.auth.database | quote }}
        - name: DB_USERNAME
          value: {{ .Values.postgres.auth.username | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.postgres.auth.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - name: http
    port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.containerPort }}
    nodePort: {{ .Values.backend.service.nodePort }}
  - name: ssh
    port: {{ .Values.backend.ssh.port }}
    targetPort: {{ .Values.backend.ssh.port }}
    nodePort: {{ .Values.backend.ssh.nodePort }}
  selector:
    app: {{ .Values.backend.name }}
