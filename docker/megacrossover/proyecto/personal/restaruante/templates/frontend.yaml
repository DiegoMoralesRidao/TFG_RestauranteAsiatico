apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  labels:
    app: {{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - name: nextjs
          containerPort: {{ .Values.frontend.containerPort }}
        - name: http
          containerPort: {{ .Values.frontend.nginxPort }}
        - name: ssh
          containerPort: {{ .Values.frontend.ssh.port }}
        env:
        - name: NEXT_PUBLIC_API_URL
          value: {{ .Values.frontend.apiUrl | default "" | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - name: http
    port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.containerPort }}
    nodePort: {{ .Values.frontend.service.nodePort }}
  - name: ssh
    port: {{ .Values.frontend.ssh.port }}
    targetPort: {{ .Values.frontend.ssh.port }}
    nodePort: {{ .Values.frontend.ssh.nodePort }}
  selector:
    app: {{ .Values.frontend.name }}
